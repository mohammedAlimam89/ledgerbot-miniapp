<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal Entry</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #ffffff);
    --text: var(--tg-theme-text-color, #111111);
    --hint: var(--tg-theme-hint-color, #999999);
    --link: var(--tg-theme-link-color, #2481cc);
    --btn: var(--tg-theme-button-color, #2481cc);
    --btn-text: var(--tg-theme-button-text-color, #ffffff);
    --secbg: var(--tg-theme-secondary-bg-color, #f4f4f5);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:16px; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:15px;
  }
  h2{margin:0 0 16px; font-size:18px;}
  label{display:block; font-size:13px; color:var(--hint); margin:12px 0 4px;}
  input, select{
    width:100%; padding:10px; border:1px solid var(--secbg); border-radius:8px;
    background:var(--secbg); color:var(--text); font-size:15px;
  }
  .line{
    border:1px solid var(--secbg); border-radius:10px; padding:10px; margin-top:10px;
    position:relative; background:var(--secbg);
  }
  .line-row{display:flex; gap:8px; margin-top:8px;}
  .line-row input{flex:1;}
  .remove-btn{
    position:absolute; top:8px; right:8px; background:none; border:none;
    color:#e53935; font-size:18px; cursor:pointer; padding:0 4px;
  }
  .add-btn{
    width:100%; padding:10px; margin-top:12px; border:1px dashed var(--link);
    background:transparent; color:var(--link); border-radius:8px; font-size:14px;
    cursor:pointer;
  }
  .balance-bar{
    display:flex; justify-content:space-between; margin-top:16px; padding:10px;
    border-radius:8px; background:var(--secbg); font-size:13px;
  }
  .balance-bar span.ok{color:#2e7d32; font-weight:600;}
  .balance-bar span.bad{color:#e53935; font-weight:600;}
  .submit-btn{
    width:100%; padding:14px; margin-top:20px; border:none; border-radius:10px;
    background:var(--btn); color:var(--btn-text); font-size:16px; font-weight:600;
    cursor:pointer;
  }
  .submit-btn:disabled{opacity:0.5;}
  .error{color:#e53935; font-size:13px; margin-top:8px; display:none;}
  .status{font-size:13px; margin-top:8px; text-align:center; color:var(--hint);}
</style>
</head>
<body>

<h2>New Journal Entry</h2>

<label for="desc">Description</label>
<input id="desc" type="text" placeholder="e.g. Office rent for July">

<label for="entryDate">Date</label>
<input id="entryDate" type="date">

<div id="lines"></div>

<button class="add-btn" onclick="addLine()">+ Add line</button>

<div class="balance-bar">
  <div>Debit: <span id="totalDebit">0.00</span></div>
  <div>Credit: <span id="totalCredit">0.00</span></div>
  <div id="balanceStatus">—</div>
</div>

<div class="error" id="errorMsg"></div>
<div class="status" id="statusMsg"></div>

<button class="submit-btn" id="submitBtn" onclick="submitEntry()" disabled>Submit Entry</button>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const API_URL = "https://kchqsazvfxhbqyafsqcp.supabase.co/functions/v1/journal-app-api";

document.getElementById("entryDate").value = new Date().toISOString().slice(0, 10);

let accounts = [];
let lineCount = 0;

function accountOptions(selectedId) {
  return accounts.map(a =>
    `<option value="${a.id}" ${a.id == selectedId ? "selected" : ""}>${a.name}</option>`
  ).join("");
}

function addLine() {
  lineCount++;
  const id = lineCount;
  const div = document.createElement("div");
  div.className = "line";
  div.id = `line-${id}`;
  div.innerHTML = `
    <button class="remove-btn" onclick="removeLine(${id})">✕</button>
    <label>Account</label>
    <select id="acct-${id}" onchange="recalc()">${accountOptions()}</select>
    <div class="line-row">
      <div>
        <label>Debit</label>
        <input id="debit-${id}" type="number" step="0.01" min="0" value="0" oninput="recalc()">
      </div>
      <div>
        <label>Credit</label>
        <input id="credit-${id}" type="number" step="0.01" min="0" value="0" oninput="recalc()">
      </div>
    </div>
  `;
  document.getElementById("lines").appendChild(div);
  recalc();
}

function removeLine(id) {
  const el = document.getElementById(`line-${id}`);
  if (el) el.remove();
  recalc();
}

function getLines() {
  const lineDivs = document.querySelectorAll(".line");
  const lines = [];
  lineDivs.forEach(div => {
    const id = div.id.split("-")[1];
    const account_id = parseInt(document.getElementById(`acct-${id}`).value);
    const debit = parseFloat(document.getElementById(`debit-${id}`).value) || 0;
    const credit = parseFloat(document.getElementById(`credit-${id}`).value) || 0;
    if (debit > 0 || credit > 0) {
      lines.push({ account_id, debit, credit });
    }
  });
  return lines;
}

function recalc() {
  const lines = getLines();
  const totalDebit = lines.reduce((s, l) => s + l.debit, 0);
  const totalCredit = lines.reduce((s, l) => s + l.credit, 0);
  document.getElementById("totalDebit").textContent = totalDebit.toFixed(2);
  document.getElementById("totalCredit").textContent = totalCredit.toFixed(2);

  const statusEl = document.getElementById("balanceStatus");
  const submitBtn = document.getElementById("submitBtn");
  const desc = document.getElementById("desc").value.trim();
  const date = document.getElementById("entryDate").value;

  const balanced = lines.length >= 2 && Math.abs(totalDebit - totalCredit) < 0.005 && totalDebit > 0;

  if (balanced) {
    statusEl.innerHTML = `<span class="ok">Balanced ✓</span>`;
  } else {
    statusEl.innerHTML = `<span class="bad">Not balanced</span>`;
  }

  submitBtn.disabled = !(balanced && desc.length > 0 && date.length > 0);
}

document.getElementById("desc").addEventListener("input", recalc);
document.getElementById("entryDate").addEventListener("change", recalc);

async function loadAccounts() {
  document.getElementById("statusMsg").textContent = "Loading accounts...";
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "get_accounts",
        initData: tg?.initData || ""
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Failed to load accounts");
    accounts = data.accounts || [];
    document.getElementById("statusMsg").textContent = "";
    addLine();
    addLine();
  } catch (err) {
    document.getElementById("statusMsg").textContent = "";
    document.getElementById("errorMsg").style.display = "block";
    document.getElementById("errorMsg").textContent = "Error loading accounts: " + err.message;
  }
}

async function submitEntry() {
  const desc = document.getElementById("desc").value.trim();
  const date = document.getElementById("entryDate").value;
  const lines = getLines();
  const submitBtn = document.getElementById("submitBtn");
  const errorEl = document.getElementById("errorMsg");
  errorEl.style.display = "none";

  submitBtn.disabled = true;
  submitBtn.textContent = "Submitting...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action: "submit_entry",
        initData: tg?.initData || "",
        description: desc,
        date: date,
        lines: lines
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Submission failed");

    if (tg) {
      tg.showAlert("Journal entry posted successfully.", () => tg.close());
    } else {
      document.getElementById("statusMsg").textContent = "Entry posted successfully.";
    }
  } catch (err) {
    errorEl.style.display = "block";
    errorEl.textContent = "Error: " + err.message;
    submitBtn.disabled = false;
    submitBtn.textContent = "Submit Entry";
  }
}

loadAccounts();
</script>

</body>
</html>
